version: '3.8'

services:

  mongo:
    image: mongo:latest
    # ports:
    #   - "27099:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - app_network

  prolog-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prolog
    ports:
      - "${PORT_PROLOG}:${PORT_PROLOG}"
    volumes:
      - ../pl:/app/pl
      # - /mnt/hdd_1/tesnim/version1/prolog_out_v2:/mnt/prolog_out_v2
      # - /mnt/hdd_1/tesnim/version1/prolog_out_v3:/mnt/prolog_out_v3
      - /mnt/hdd_1/biocypher-kg/output/human/prolog_out_v2:/mnt/prolog_out_v2
      - /mnt/hdd_1/biocypher-kg/output/human/prolog_out_v3:/mnt/prolog_out_v3
    networks:
      - app_network

  dask-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: dask-scheduler
    ports:
      - "8786:8786" 
      - "8787:8787" 
    environment:
      - PYTHONPATH=${PYTHONPATH}
      - SKIP_SEED=${SKIP_SEED}
    volumes:
      - ..:/app
    entrypoint: []
    command: >
      sh -c "dask scheduler --host 0.0.0.0 --port 8786 --dashboard-address :8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from dask.distributed import Client; c = Client('tcp://127.0.0.1:8786', connection_limit=1, timeout='5s'); c.close()"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
    networks:
      - app_network

  dask-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - DASK_ADDRESS=${DASK_ADDRESS}
      - PREFECT_API_URL=${PREFECT_API_URL}
      - PYTHONPATH=${PYTHONPATH}
      - SWIPL_HOST=${HOST_PROLOG}
      - SWIPL_PORT=${PORT_PROLOG}
      - ENSEMBL_HGNC_MAP=${ENSEMBL_HGNC_MAP}
      - HGNC_ENSEMBL_MAP=${HGNC_ENSEMBL_MAP}
      - GO_MAP=${GO_MAP}
      - SKIP_SEED=${SKIP_SEED}
      - API_HOST=${HOST_API}
      - API_PORT=${PORT_API}
      - OPENAI_API_KEY=${OpenAI}
    env_file:
      - ../.env
    volumes:
      - ..:/app
      - ../data:/app/data
      - /mnt/hdd_1/rediet/hypothesis-generation-demo/data:/app/data/external_data
    depends_on:
      dask-scheduler:
        condition: service_healthy  
      mongo:
        condition: service_started
      prolog-service:
        condition: service_started
    command: >
      uv run dask worker ${DASK_ADDRESS}
      --nworkers 4
      --nthreads 1 
      --memory-limit 40GB
      --preload dask_preload
    deploy:
      mode: replicated
      replicas: 1  
      resources:
        limits:
          cpus: '64.0'   
          memory: 180G    

    networks:
      - app_network

  api-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5008:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - PREFECT_API_URL=${PREFECT_API_URL}
      - PYTHONPATH=${PYTHONPATH}
      - DASK_ADDRESS=${DASK_ADDRESS}
      - ENSEMBL_HGNC_MAP=${ENSEMBL_HGNC_MAP}
      - HGNC_ENSEMBL_MAP=${HGNC_ENSEMBL_MAP}
      - GO_MAP=${GO_MAP}
      - SWIPL_HOST=${HOST_PROLOG}
      - SWIPL_PORT=${PORT_PROLOG}
      - OPENAI_API_KEY=${OpenAI}
      - REDIS_URL=${REDIS_URL}
    env_file:
      - ../.env
    volumes:
      - ..:/app
      - ../data:/app/data
    depends_on:
      mongo:
        condition: service_started
      prefect-service:
        condition: service_healthy
      dask-scheduler:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      uv run gunicorn "server:create_app_with_config"
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:${PORT_API}
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --access-logfile -
      --error-logfile -
    networks:
      - app_network
  prefect-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prefect
    ports:
      - "4292:${PORT_PREFECT}"
    volumes:
      - ..:/app
      - prefect-data:/root/.prefect 
    environment:
      - PREFECT_API_URL=http://${PORT_PREFECT}/api
      - UV_PROJECT_ENVIRONMENT=/opt/prefect-venv
      - DASK_ADDRESS=${DASK_ADDRESS}
    env_file:
      - ../.env
    command: > 
      sh -c "uv run prefect server start --host 0.0.0.0"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://${PORT_PREFECT}api/health"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 300s
  
  prefect-deployment:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    deploy:
      resources:
        limits:
          memory: 8G
    volumes:
      - ..:/app
      - ../data:/app/data
      - /mnt/hdd_1/rediet/hypothesis-generation-demo/data:/app/data/external_data
    env_file:
      - ../.env
    command: >
      bash -c "
      echo '--- 1. Enforcing Safety Limits (Creating Pools) ---' &&
      uv run prefect work-pool create 'analysis-pool' --type process --overwrite &&
      uv run prefect work-pool update 'analysis-pool' --concurrency-limit 3 &&
      uv run prefect work-pool create 'interactive-pool' --type process --overwrite &&
      uv run prefect work-pool update 'interactive-pool' --concurrency-limit 10 &&
      uv run prefect concurrency-limit create harmonize_tag 2 || true &&

      echo '--- 2. Registering Flows ---' &&
      uv run python app/workers/workflows/deploy.py --ensembl-hgnc-map ${ENSEMBL_HGNC_MAP} --hgnc-ensembl-map ${HGNC_ENSEMBL_MAP} --go-map ${GO_MAP} --swipl-host ${HOST_PROLOG} --swipl-port ${PORT_PROLOG} &&

      echo '--- 3. Starting The Chefs (Workers) ---' &&
      uv run prefect worker start --pool 'analysis-pool' --name 'heavy-worker' &
      uv run prefect worker start --pool 'interactive-pool' --name 'light-worker' &
      
      echo '--- 4. Keeping Container Alive ---' &&
      tail -f /dev/null
      "
    environment:
      - PREFECT_API_URL=${PREFECT_API_URL}
      - UV_PROJECT_ENVIRONMENT=/opt/flask-venv
      - DASK_ADDRESS=${DASK_ADDRESS}
      - PYTHONPATH=${PYTHONPATH}
      - ENSEMBL_HGNC_MAP=${ENSEMBL_HGNC_MAP}
      - HGNC_ENSEMBL_MAP=${HGNC_ENSEMBL_MAP}
      - GO_MAP=${GO_MAP}
      - API_HOST=${HOST_API}
      - API_PORT=${PORT_API}
      - OPENAI_API_KEY=${OpenAI}
    depends_on:
      prefect-service:
        condition: service_healthy
      dask-scheduler:
        condition: service_started
      mongo:
        condition: service_started
    networks:
      - app_network
  
  redis:
    image: redis:7-alpine
    ports:
      - "6399:${PORT_REDIS}"
    networks:
      - app_network

volumes:
  mongo-data:
  prefect-data:

networks:
  app_network:
    driver: bridge